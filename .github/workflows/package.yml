name: Package

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

jobs:
  package:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: modelverse-build-${{ matrix.os }}
          path: |
            server.js
            public/
            package.json
            node_modules/
