<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Llama.cpp UI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span>Llama.cpp</span>
        </div>
        <div class="sidebar-header-actions">
          <button class="icon-btn mobile-only" id="menuBtn" title="Menu">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <button class="icon-btn" id="collapseBtn" title="Collapse sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
        </div>
        <button class="icon-btn" id="newChatBtn" title="New Chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-section">
        <label class="section-label">Model</label>
        <div class="model-select-row">
          <select id="modelSelect" class="model-select">
            <option value="">Select a model...</option>
          </select>
          <button class="icon-btn" id="refreshModelsBtn" title="Refresh model list">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
        </div>
        <div class="model-info" id="modelInfo"></div>
        <div class="server-controls">
          <button id="startBtn" class="btn btn-primary btn-full">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start Server
          </button>
          <button id="stopBtn" class="btn btn-danger btn-full" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            Stop Server
          </button>
        </div>
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot"></span>
          <span class="status-text">Disconnected</span>
        </div>
      </div>

      <div class="sidebar-section sidebar-history">
        <div class="section-label-row">
          <label class="section-label">Conversations</label>
          <button class="icon-btn icon-btn-sm" id="exportBtn" title="Export conversation">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
        <div class="conv-search">
          <svg class="conv-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="convSearch" class="conv-search-input" placeholder="Search conversations...">
        </div>
        <div id="conversationList" class="conversation-list"></div>
      </div>

      <div class="sidebar-footer">
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <a href="https://github.com/uttampaliwal/llama-ui" target="_blank" class="icon-btn" title="GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
        </a>
      </div>
      <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
    </aside>

    <main class="main">
      <button class="sidebar-expand-btn" id="sidebarExpandBtn" title="Expand sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
      <div class="chat-container" id="chatContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h1>Llama.cpp UI</h1>
          <p>Select a model and start the server to begin chatting</p>
          <div class="quick-actions">
            <button class="quick-action" onclick="showShortcuts()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h0M10 10h0M14 10h0M18 10h0M8 14h8"/>
              </svg>
              Keyboard Shortcuts
            </button>
          </div>
        </div>

        <div class="messages" id="messages"></div>
        <button class="scroll-bottom-btn" id="scrollBottomBtn" title="Scroll to bottom">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/></svg>
        </button>
      </div>

      <div class="input-area">
        <div class="input-container">
          <button class="icon-btn attach-btn" id="attachBtn" title="Attach file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <input type="file" id="fileInput" accept="image/*" hidden>
          <div class="input-text-area">
            <div class="attachment-preview" id="attachmentPreview" style="display:none">
              <img id="previewImage" alt="Attached image">
              <button class="icon-btn remove-attach" id="removeAttachBtn" title="Remove">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <textarea id="userInput" placeholder="Type a message... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
          </div>
          <div class="input-actions">
            <button id="sendBtn" class="icon-btn send-btn" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
            <button id="stopGenerateBtn" class="icon-btn stop-btn" style="display:none">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            </button>
          </div>
        </div>
        <div class="input-footer">
          <span id="tokenCount"></span>
          <span id="latency"></span>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="shortcutsModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Keyboard Shortcuts</h3>
        <button class="icon-btn" onclick="closeModal('shortcutsModal')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="shortcut-row"><kbd>Enter</kbd><span>Send message</span></div>
        <div class="shortcut-row"><kbd>Shift+Enter</kbd><span>New line</span></div>
        <div class="shortcut-row"><kbd>Ctrl+Shift+C</kbd><span>Clear chat</span></div>
        <div class="shortcut-row"><kbd>Ctrl+Shift+N</kbd><span>New conversation</span></div>
        <div class="shortcut-row"><kbd>Ctrl+Shift+S</kbd><span>Toggle sidebar</span></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="icon-btn" onclick="closeModal('settingsModal')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="settings-tabs">
          <button class="settings-tab active" data-tab="params">Parameters</button>
          <button class="settings-tab" data-tab="system">System Prompt</button>
          <button class="settings-tab" data-tab="presets">Presets</button>
        </div>
        <div class="settings-panel active" id="settingsParams">
          <div class="param-row">
            <label>Temperature</label>
            <div class="param-input">
              <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
              <span id="temperatureVal">0.7</span>
            </div>
          </div>
          <div class="param-row">
            <label>Top P</label>
            <div class="param-input">
              <input type="range" id="topP" min="0" max="1" step="0.05" value="0.9">
              <span id="topPVal">0.9</span>
            </div>
          </div>
          <div class="param-row">
            <label>Top K</label>
            <div class="param-input">
              <input type="range" id="topK" min="1" max="100" step="1" value="40">
              <span id="topKVal">40</span>
            </div>
          </div>
          <div class="param-row">
            <label>Max Tokens</label>
            <div class="param-input">
              <input type="number" id="maxTokens" min="64" max="8192" value="4096">
            </div>
          </div>
          <div class="param-row">
            <label>Context Size</label>
            <div class="param-input">
              <input type="number" id="contextSize" min="512" max="131072" step="512" value="4096">
            </div>
          </div>
          <div class="param-row">
            <label>GPU Layers</label>
            <div class="param-input">
              <input type="number" id="gpuLayers" min="0" max="200" value="99">
            </div>
          </div>
          <div class="param-row">
            <label>Threads</label>
            <div class="param-input">
              <input type="number" id="threads" min="1" max="32" value="4">
            </div>
          </div>
          <div class="param-row">
            <label>Repeat Penalty</label>
            <div class="param-input">
              <input type="range" id="repeatPenalty" min="0" max="2" step="0.05" value="1.1">
              <span id="repeatPenaltyVal">1.1</span>
            </div>
          </div>
          <button id="applySettings" class="btn btn-secondary btn-full">Apply Settings</button>
        </div>
        <div class="settings-panel" id="settingsSystem">
          <textarea id="systemPrompt" rows="6" placeholder="Enter system prompt..." style="width:100%;padding:10px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:13px;resize:vertical;font-family:inherit;">You are a helpful assistant.</textarea>
        </div>
        <div class="settings-panel" id="settingsPresets">
          <div class="preset-section" style="border:none;padding:0;margin:0;">
            <div class="preset-row">
              <select id="presetSelect" class="preset-select">
                <option value="">Load preset...</option>
              </select>
              <div class="preset-actions">
                <button class="icon-btn" id="savePresetBtn" title="Save current params as preset">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                </button>
                <button class="icon-btn" id="deletePresetBtn" title="Delete selected preset">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']]
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] },
      startup: {
        ready() {
          MathJax.startup.defaultReady();
          MathJax.startup.promise.then(() => {
            document.querySelectorAll('.message').forEach(el => {
              try { MathJax.typesetPromise([el]); } catch (e) {}
            });
          });
        }
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js?v=20260708e"></script>
</body>
</html>
